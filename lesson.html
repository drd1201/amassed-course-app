<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Strategic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4A853; --orange: #f97316; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar - Module Menu Only */
        #sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .mod-btn { padding: 1.2rem 2rem; border-bottom: 1px solid #111; cursor: pointer; color: #555; font-weight: 700; transition: 0.3s; text-align: left; background: none; border-left: 0; border-right: 0; width: 100%; }
        .mod-btn:hover, .mod-btn.active { color: var(--gold); background: #111; border-left: 4px solid var(--gold); }

        #content { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        
        .header-tools { padding: 1.5rem 3rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        
        /* The Scrollable Source Guide Box */
        .scroller-box { flex: 1; overflow-y: auto; padding: 4rem; background: #080808; margin: 1.5rem; border: 1px solid #151515; border-radius: 12px; }
        .reading-width { max-width: 700px; margin: 0 auto; line-height: 1.9; font-size: 1.2rem; color: #ccc; }
        
        /* Bottom Controls */
        .audio-dock { padding: 1.5rem 3rem; background: rgba(10,10,10,0.98); border-top: 1px solid var(--gold); display: flex; align-items: center; justify-content: space-between; }
        .jump-select { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* NotebookLM Floating Link */
        .epub-link { background: var(--orange); color: black; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: 900; box-shadow: 0 0 20px rgba(249,115,22,0.4); }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div style="padding: 2.5rem; border-bottom: 1px solid #222;"><a href="index.html" style="color:var(--orange); text-decoration:none; font-weight:900; font-size:1.5rem;">AMASSED</a></div>
        <div id="moduleList">
            <button class="mod-btn active" onclick="loadModule(0)">Introductory Essentials</button>
            <button class="mod-btn" onclick="loadModule(1)">Module 1: The Battlefield</button>
            <button class="mod-btn" onclick="loadModule(2)">Module 2: RRR Strategy</button>
        </div>
    </aside>
    
    <main id="content">
        <header class="header-tools">
            <h2 id="mTitle" style="color:var(--gold); font-family:'Playfair Display'; margin:0;">Loading...</h2>
            <div style="display: flex; gap: 20px; align-items: center;">
                <a href="YOUR_NOTEBOOK_LM_URL_HERE" target="_blank" class="epub-link">OPEN NOTEBOOK SOURCE</a>
                <select id="jumpMenu" class="jump-select" onchange="loadModule(parseInt(this.value))"></select>
            </div>
        </header>

        <div class="scroller-box" id="pageScroller">
            <div class="reading-width" id="mBody">
                </div>
        </div>

        <div class="audio-dock">
            <div><span id="aTitle" style="color:var(--gold); font-weight:bold;"></span><br><small style="color:#444;">Strategic Audio Companion</small></div>
            <button id="playBtn" onclick="toggleAudio()" style="background:var(--gold); padding: 1rem 2.5rem; border:none; border-radius:8px; font-weight:900; cursor:pointer;">PLAY AUDIO</button>
        </div>
    </main>

    <script src="curriculum_data.js"></script>
    <script>
        let audio = null;
        function loadModule(id) {
            const data = MODULE_DATA[id];
            document.getElementById('mTitle').innerText = data.title;
            document.getElementById('aTitle').innerText = data.title;
            document.getElementById('mBody').innerHTML = data.content;
            document.getElementById('pageScroller').scrollTop = 0;
            document.getElementById('jumpMenu').value = id;

            if(audio) { audio.pause(); audio = null; }
            audio = new Audio(data.audio);
            document.getElementById('playBtn').innerText = 'PLAY AUDIO';
        }
        
        function toggleAudio() {
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = 'PAUSE'; }
            else { audio.pause(); document.getElementById('playBtn').innerText = 'PLAY'; }
        }

        // Initialize Jump Menu from JS
        const jump = document.getElementById('jumpMenu');
        MODULE_DATA.forEach((mod, index) => {
            jump.innerHTML += `<option value="${index}">${mod.title}</option>`;
        });
        loadModule(0);
    </script>
</body>
</html>
