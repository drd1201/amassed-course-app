<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Classroom</title>
    <style>
        :root { --gold: #D4A853; --orange: #f97316; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        #sidebar { width: 320px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        #content { flex: 1; display: flex; flex-direction: column; background: #000; }
        .scroller { flex: 1; overflow-y: auto; padding: 4rem; scroll-behavior: smooth; }
        .reading-width { max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1.2rem; color: #ccc; }
        .audio-dock { padding: 1.5rem 3rem; background: rgba(10,10,10,0.98); border-top: 1px solid var(--gold); display: flex; align-items: center; justify-content: space-between; }
        .nav-item { padding: 1rem 2rem; border-bottom: 1px solid #111; cursor: pointer; transition: 0.3s; color: #666; }
        .nav-item.active { background: #111; color: var(--gold); border-left: 4px solid var(--gold); }
        .callout { background: #111; padding: 2rem; border-left: 4px solid var(--gold); margin: 2rem 0; font-style: italic; }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div style="padding: 2.5rem; border-bottom: 1px solid #222;"><a href="index.html" style="color:var(--orange); text-decoration:none; font-weight:900; font-size:1.5rem;">AMASSED</a></div>
        <div id="moduleList"></div>
    </aside>
    <main id="content">
        <div class="scroller" id="pageScroller">
            <div class="reading-width">
                <h1 id="mTitle" style="color:var(--gold); font-family:'Playfair Display'; font-size: 3.5rem;"></h1>
                <div id="mBody"></div>
            </div>
        </div>
        <div class="audio-dock">
            <div><span id="aTitle" style="color:var(--gold); font-weight:bold;"></span><br><small>Strategic Audio Companion</small></div>
            <button id="playBtn" onclick="toggleAudio()" style="background:var(--gold); padding: 1rem 2.5rem; border:none; border-radius:8px; font-weight:900; cursor:pointer;">PLAY AUDIO</button>
        </div>
    </main>
    <script src="curriculum_data.js"></script>
    <script>
        let audio = null;
        function loadModule(id) {
            const data = MODULE_DATA[id];
            document.getElementById('mTitle').innerText = data.title;
            document.getElementById('aTitle').innerText = data.title;
            document.getElementById('mBody').innerHTML = data.content;
            document.getElementById('pageScroller').scrollTop = 0;
            if(audio) audio.pause();
            audio = new Audio(data.audio);
            document.getElementById('playBtn').innerText = 'PLAY AUDIO';
            document.querySelectorAll('.nav-item').forEach((el, idx) => el.classList.toggle('active', idx == id));
        }
        function toggleAudio() {
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = 'PAUSE'; }
            else { audio.pause(); document.getElementById('playBtn').innerText = 'PLAY'; }
        }
        const list = document.getElementById('moduleList');
        MODULE_DATA.forEach((mod, index) => {
            list.innerHTML += `<div class="nav-item" onclick="loadModule(${index})">${mod.title}</div>`;
        });
        loadModule(0);
    </script>
</body>
</html>
