lor: var(--gray-400); margin-bottom: 1.5rem; } .modal .btn { margin: 0.25rem; } .sidebar-toggle { display: none; position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 80; width: 48px; height: 48px; border-radius: 50%; background: var(--orange-500); color: var(--black); border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(249,115,22,0.4); font-size: 1.2rem; transition: all var(--transition); } .sidebar-toggle:hover { transform: scale(1.05); } @media (max-width: 768px) { .sidebar { transform: translateX(-100%); width: 280px; } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0 !important; } .sidebar-toggle { display: flex; align-items: center; justify-content: center; } .rrr-stepper { flex-direction: column; } .rrr-step { border-right: none; border-bottom: 1px solid var(--black-border); } .rrr-step:last-child { border-bottom: none; } .content-area { padding: 1.5rem 1rem 3rem; } .lesson-header h1 { font-size: 1.5rem; } .actions-bar { flex-direction: column; gap: 0.75rem; } .actions-bar .btn { width: 100%; justify-content: center; } .topbar-progress-wrap { display: none; } } @media print { .sidebar, .topbar, .sidebar-toggle { display: none !important; } .main-content { margin-left: 0 !important; } }</style>

<script>
const CURRICULUM={0:{title:"Introductory Essentials",subtitle:"The Joy of the Lord and the RRR Framework",lessons:[{id:"0-intro",title:"Welcome to AMASSED",remember:{heading:"Welcome to the Journey",content:'<p>Welcome to <strong>AMASSED</strong> \u2014 a Battlefield Discipleship course designed to sharpen your faith, ground your leadership, and equip you for the mission God has placed on your life.</p><p>This isn\'t just another study. This is a <strong>transformation framework</strong> built on three pillars we call the <strong>RRR Framework</strong>:</p><ul><li><strong>Remember</strong> \u2014 absorb the truth, ground yourself in the Word</li><li><strong>Recount</strong> \u2014 share your story, connect your experience to God\'s promises</li><li><strong>Recertify</strong> \u2014 confirm your understanding, lock it in, move forward</li></ul>',scripture:{verse:"The joy of the LORD is your strength.",ref:"Nehemiah 8:10"},keyConcept:"The RRR Framework isn't linear \u2014 it's a cycle. Each time you go through it, you go deeper. Think of it as a spiral staircase ascending toward Christ-centered leadership."},recount:{prompt:"Describe a moment in your life when you felt God was preparing you for something bigger. How does that moment connect to where you are right now?",hint:"Be honest. Be specific. Think about the season \u2014 what was happening around you? What was God doing in you?"},recertify:{question:"What does the 'R' in 'Recount' represent in the AMASSED RRR Framework?",options:["Reviewing study notes","Sharing and connecting your personal story to God's truth","Repeating memory verses","Recording audio devotionals"],correct:1,explanation:"'Recount' means to share your story \u2014 to connect your lived experience to the promises and truths of God. It's where head knowledge meets heart transformation."}},{id:"0-joy",title:"The Joy of the Lord",remember:{heading:"From Chilled Meat to Fresh BBQ",content:'<p>There\'s a difference between <strong>chilled meat</strong> and <strong>fresh BBQ</strong>. One sits cold in the fridge \u2014 preserved, safe, untouched. The other has been through the fire and it\'s <em>ready to serve</em>.</p><p>Too many believers are living like chilled meat. They\'ve got the ingredients \u2014 faith, knowledge, good intentions \u2014 but they haven\'t let the fire of God\'s joy transform them into something that feeds others.</p><p>The <strong>Joy of the Lord</strong> isn\'t happiness that depends on circumstances. It\'s a deep, unshakeable strength that comes from knowing who God is and what He has done.</p><ul><li>Joy sustains you when circumstances don\'t</li><li>Joy becomes your witness to the world</li><li>Joy fuels leadership that lasts</li></ul>',scripture:{verse:"You make known to me the path of life; in your presence there is fullness of joy; at your right hand are pleasures forevermore.",ref:"Psalm 16:11"},keyConcept:"Fresh BBQ leadership: You have to go through the fire to be ready to serve. God's joy is the fuel, the smoke, and the seasoning."},recount:{prompt:"Think about a time when your joy felt 'chilled' \u2014 when you were going through the motions of faith without the fire. What reignited you? What did God use to bring the heat back?",hint:"This could be a sermon, a friend, a crisis that woke you up, or a quiet moment with the Lord."},recertify:{question:"In the 'Chilled Meat to Fresh BBQ' analogy, what does 'going through the fire' represent?",options:["Suffering without purpose","Letting God's joy and trials transform you into someone who can serve and lead","Burning out in ministry","Being punished for sin"],correct:1,explanation:"The fire represents the transformative process where God's joy meets real life challenges. It's not punishment \u2014 it's preparation. Fresh BBQ is ready to serve because it's been through the process."}}]},1:{title:"For Christ",subtitle:"Remembering... the battle is the Lord's",lessons:[{id:"1-battle",title:"The Battle Is the Lord's",remember:{heading:"Grounding Leadership in Victory",content:'<p>Before David faced Goliath, before the stone left the sling, the battle was already won. Not because David was strong or skilled \u2014 but because <strong>the battle belonged to the Lord</strong>.</p><p>This is the foundation of Christ-centered leadership: <strong>you don\'t fight for victory \u2014 you fight from victory</strong>. Christ has already won. Your job is to walk in that truth.</p><p>Too many leaders exhaust themselves trying to win battles that are already decided.</p><ul><li>The enemy is already defeated (Colossians 2:15)</li><li>Your strength comes from surrender, not self-sufficiency</li><li>Leadership "For Christ" means letting Him lead through you</li></ul>',scripture:{verse:"The LORD will fight for you; you need only to be still.",ref:"Exodus 14:14"},keyConcept:"Victory-based leadership flips the script. You're not climbing toward success \u2014 you're operating from a position Christ already secured."},recount:{prompt:"Describe a time when you tried to fight a battle in your own strength \u2014 and then realized God was asking you to step back and let Him fight. What happened?",hint:"This could be in your career, your family, your ministry, or an internal struggle. Focus on the turning point."},recertify:{question:"What does it mean to 'fight from victory' instead of 'fight for victory'?",options:["Winning every argument","Operating from the position Christ already secured on the cross","Being passive and doing nothing","Never facing challenges"],correct:1,explanation:"Fighting FROM victory means recognizing that Christ has already won the decisive battle. Our leadership flows from that finished work."}},{id:"1-remember",title:"The Power of Remembering",remember:{heading:"Why God Tells Us to Remember",content:'<p>Throughout Scripture, God commands His people to <strong>remember</strong>. The Israelites built altars, celebrated feasts, and told stories \u2014 all to remember what God had done.</p><p>Remembering isn\'t nostalgia. It\'s a <strong>strategic act of faith</strong>.</p><ul><li><strong>Remember your calling</strong> \u2014 God chose you for this</li><li><strong>Remember His faithfulness</strong> \u2014 He hasn\'t failed yet</li><li><strong>Remember the cost</strong> \u2014 Christ paid it all</li><li><strong>Remember the promises</strong> \u2014 they are yes and amen</li></ul><p>When the battle gets thick, your memory of God\'s faithfulness becomes your battle cry.</p>',scripture:{verse:"Remember the wonders he has done, his miracles, and the judgments he pronounced.",ref:"1 Chronicles 16:12"},keyConcept:"Building 'memorial stones' in your life \u2014 specific, documented moments where God showed up \u2014 gives you ammunition for future battles."},recount:{prompt:"What are your 'memorial stones'? Name 2-3 specific moments where God showed up in your life in a way you can never deny.",hint:"Think of healings, provisions, doors that opened or closed, people God placed in your path."},recertify:{question:"Why does God repeatedly command His people to 'remember' throughout Scripture?",options:["Because God is forgetful","Because remembering past faithfulness builds faith for present and future battles","Because it's just a tradition","Because it makes for good storytelling"],correct:1,explanation:"Remembering is a strategic act of faith. When you recall God's past faithfulness, it strengthens your trust in Him for current challenges."}}]},2:{title:"Christ Leads, Always",subtitle:"Recounting His leadership with accuracy",lessons:[{id:"2-accuracy",title:"Accuracy in Recounting",remember:{heading:"Telling God's Story Right",content:'<p>When we recount what God has done, <strong>accuracy matters</strong>. Not embellishment. Not minimizing. The raw, honest truth.</p><p>Accurate recounting requires:</p><ul><li><strong>Honesty about the struggle</strong> \u2014 don\'t skip the valley</li><li><strong>Specificity about the breakthrough</strong> \u2014 name what God did</li><li><strong>Humility in the telling</strong> \u2014 it\'s His story, not yours</li><li><strong>Courage to be vulnerable</strong> \u2014 real stories require real openness</li></ul><p>When you tell God\'s story accurately, you give others permission to trust Him with their own mess.</p>',scripture:{verse:"Come and hear, all you who fear God; let me tell you what he has done for me.",ref:"Psalm 66:16"},keyConcept:"Accuracy in testimony isn't about perfection \u2014 it's about integrity. When leaders tell the real story, it carries more power than any polished narrative."},recount:{prompt:"Take one of your 'memorial stones' from Module 1 and recount it with full accuracy. Include the struggle, the doubt, and the exact moment God moved.",hint:"This is practice in honest testimony. Write it as if you're sharing with someone who needs to hear that God is real."},recertify:{question:"Why is accuracy so important when recounting what God has done?",options:["So the story sounds more impressive","Because honest, specific testimony builds authentic faith in the listener","To avoid legal issues","Because exaggeration is a minor issue"],correct:1,explanation:"Accurate testimony carries spiritual weight because it's rooted in truth."}},{id:"2-peaks",title:"Peaks and Valleys",remember:{heading:"God Doesn't Waste a Hurt",content:'<p>Every leader has peaks and valleys. The question isn\'t whether you\'ll face them \u2014 it\'s whether you\'ll let God <strong>use</strong> them.</p><p><strong>God does not waste a hurt.</strong> Every wound, every setback has purpose in His hands.</p><ul><li><strong>Peaks</strong> teach you gratitude and stewardship</li><li><strong>Valleys</strong> teach you dependence and depth</li><li><strong>The journey between</strong> teaches you faithfulness</li></ul><p>When you lead from redeemed pain, your leadership carries weight that comfort alone can never produce.</p>',scripture:{verse:"And we know that in all things God works for the good of those who love him, who have been called according to his purpose.",ref:"Romans 8:28"},keyConcept:"Redeemed pain is your greatest leadership asset. The thing that almost broke you? That's the very thing God wants to use to reach someone else."},recount:{prompt:"What is the 'hurt' that God has been redeeming in your life? How has a past valley become a tool for leadership or service?",hint:"This is often the hardest and most powerful writing you'll do in this course. Take your time. Be brave."},recertify:{question:"What does 'God doesn't waste a hurt' mean for leadership?",options:["Leaders should never show weakness","Every wound and setback, when surrendered to God, becomes a tool for ministry and deeper leadership","Pain is punishment for poor decisions","Good leaders avoid all suffering"],correct:1,explanation:"God redeems our pain and uses it as our greatest testimony."}}]}};
const STORAGE_KEY='amassed_progress';function getProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return{}}}function saveProgress(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}function getLessonProgress(id){const p=getProgress();return p[id]||{remember:false,recount:false,recertify:false,journal:'',quizAnswer:null}}function saveLessonProgress(id,d){const p=getProgress();p[id]={...(p[id]||{}),...d};saveProgress(p)}
const params=new URLSearchParams(window.location.search);const moduleNum=parseInt(params.get('module')||'0');const lessonIdx=parseInt(params.get('lesson')||'0');const moduleData=CURRICULUM[moduleNum];if(!moduleData){window.location.href='index.html'}let currentLesson=lessonIdx;let currentStep=0;
function init(){document.getElementById('sidebarModuleNum').textContent='Module '+moduleNum;document.getElementById('sidebarModuleTitle').textContent=moduleData.title;document.title='AMASSED \u2014 Module '+moduleNum+': '+moduleData.title;buildSidebar();renderLesson();updateOverallProgress()}
function buildSidebar(){const nav=document.getElementById('sidebarNav');let h='<div class="sidebar-section"><div class="sidebar-section-label">Lessons</div>';moduleData.lessons.forEach((l,i)=>{const lp=getLessonProgress(l.id);const ic=lp.remember&&lp.recount&&lp.recertify;const ia=i===currentLesson;h+='<div class="sidebar-item '+(ia?'active ':' ')+(ic?'completed':'')+'" onclick="goToLesson('+i+')"><div class="sidebar-item-icon">'+(ic?'\u2713':(i+1))+'</div><div class="sidebar-item-text">'+l.title+'</div></div>';['Remember','Recount','Recertify'].forEach((s,si)=>{const sk=['remember','recount','recertify'][si];const dn=lp[sk];const ias=ia&&currentStep===si;h+='<div class="sidebar-item '+(ias?'active ':' ')+(dn?'completed':'')+'" style="padding-left:2.5rem;font-size:0.82rem;" onclick="goToLesson('+i+','+si+')"><div class="sidebar-item-icon" style="width:22px;height:22px;font-size:0.55rem;">'+(dn?'\u2713':'')+'</div><div class="sidebar-item-text">'+s+'</div></div>'})});h+='</div>';nav.innerHTML=h}
function goToLesson(idx,step){currentLesson=idx;currentStep=step!==undefined?step:0;buildSidebar();renderLesson();updateOverallProgress();document.getElementById('sidebar').classList.remove('open')}
function renderLesson(){const lesson=moduleData.lessons[currentLesson];const lp=getLessonProgress(lesson.id);const area=document.getElementById('contentArea');const sc=['remember','recount','recertify'];const sl=['Step 1','Step 2','Step 3'];const st=['Remember','Recount','Recertify'];let h='<div class="lesson-header"><div class="lesson-header-meta"><span class="rrr-badge '+sc[currentStep]+'">'+st[currentStep]+'</span><span style="font-size:0.8rem;color:var(--gray-500);">Lesson '+(currentLesson+1)+' of '+moduleData.lessons.length+'</span></div><h1>'+lesson.title+'</h1><p>'+moduleData.subtitle+'</p></div><div class="rrr-stepper">';st.forEach((s,si)=>{const ia=si===currentStep;const id=lp[sc[si]];h+='<div class="rrr-step '+(ia?'active ':' ')+(id?'completed':'')+'" onclick="switchStep('+si+')"><div class="rrr-step-num">'+(id?'\u2713':(si+1))+'</div><div class="rrr-step-info"><div class="rrr-step-label">'+sl[si]+'</div><div class="rrr-step-title">'+s+'</div></div></div>'});h+='</div>';h+='<div class="panel '+(currentStep===0?'active':'')+'" id="panelRemember"><div class="content-block"><h3><span class="icon">\ud83d\udcd6</span> '+lesson.remember.heading+'</h3>'+lesson.remember.content;if(lesson.remember.scripture){h+='<div class="scripture-box"><div class="verse">"'+lesson.remember.scripture.verse+'"</div><div class="ref">\u2014 '+lesson.remember.scripture.ref+'</div></div>'}h+='</div>';if(lesson.remember.keyConcept){h+='<div class="key-concept"><div class="key-concept-icon">\ud83d\udca1</div><div class="key-concept-text"><strong>Key Concept:</strong> '+lesson.remember.keyConcept+'</div></div>'}h+='<div class="video-placeholder"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span>Video content coming soon</span></div><div class="actions-bar"><div></div><button class="btn btn-primary" onclick="completeRemember()">I\'ve Read &amp; Understood <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button></div></div>';h+='<div class="panel '+(currentStep===1?'active':'')+'" id="panelRecount"><div class="recount-prompt"><h3>\u270d\ufe0f Reflection Prompt</h3><p>'+lesson.recount.prompt+'</p></div><div class="journal-area"><label>Your Response</label><textarea id="journalText" placeholder="'+lesson.recount.hint+'" oninput="autoSaveJournal()">'+(lp.journal||'')+'</textarea><div class="journal-char-count"><span id="charCount">'+(lp.journal||'').length+'</span> characters</div><div class="journal-saved" id="journalSaved">\u2713 Saved to your device</div></div><div class="actions-bar"><button class="btn btn-secondary" onclick="switchStep(0)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>Back to Remember</button><button class="btn btn-primary" onclick="completeRecount()" id="recountBtn">Submit &amp; Continue <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button></div></div>';h+='<div class="panel '+(currentStep===2?'active':'')+'" id="panelRecertify"><div class="quiz-card"><h3>\ud83c\udfaf Recertify Your Understanding</h3><p style="color:var(--gray-400);margin-bottom:1.25rem;">'+lesson.recertify.question+'</p>';lesson.recertify.options.forEach((opt,oi)=>{const pa=lp.quizAnswer;let cls='';if(pa!==null&&pa!==undefined){if(oi===lesson.recertify.correct)cls='correct';else if(oi===pa&&pa!==lesson.recertify.correct)cls='wrong'}h+='<div class="quiz-option '+cls+'" onclick="selectQuizOption('+oi+')" data-idx="'+oi+'"><div class="quiz-option-radio"></div><span>'+opt+'</span></div>'});if(lp.quizAnswer!==null&&lp.quizAnswer!==undefined){if(lp.quizAnswer===lesson.recertify.correct){h+='<div class="quiz-feedback correct-fb">\u2705 Correct! '+lesson.recertify.explanation+'</div>'}else{h+='<div class="quiz-feedback wrong-fb">Not quite. '+lesson.recertify.explanation+'</div>'}}h+='<div id="quizFeedback"></div></div>';const allDone=lp.remember&&lp.recount&&lp.recertify;if(allDone){h+='<div class="certification-box"><div class="cert-icon">\ud83c\udfc5</div><h3>Lesson Certified</h3><p>You\'ve completed all three steps of the RRR Framework for this lesson.</p></div>'}const isLast=currentLesson===moduleData.lessons.length-1;const isLastMod=moduleNum===2;h+='<div class="actions-bar"><button class="btn btn-secondary" onclick="switchStep(1)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>Back to Recount</button><div style="display:flex;gap:0.5rem;">';if(!isLast){h+='<button class="btn btn-primary" onclick="goToLesson('+(currentLesson+1)+')" '+((!allDone)?'disabled title="Complete all steps first"':'')+'>Next Lesson \u2192</button>'}else if(!isLastMod){h+='<button class="btn btn-gold" onclick="completeModule()" '+((!allDone)?'disabled title="Complete all steps first"':'')+'>\ud83c\udfc6 Complete Module</button>'}else{h+='<button class="btn btn-gold" onclick="completeModule()" '+((!allDone)?'disabled title="Complete all steps first"':'')+'>\ud83c\udfc6 Complete Course</button>'}h+='</div></div></div>';area.innerHTML=h;window.scrollTo({top:0,behavior:'smooth'})}
function switchStep(s){currentStep=s;buildSidebar();renderLesson()}
function completeRemember(){const l=moduleData.lessons[currentLesson];saveLessonProgress(l.id,{remember:true});currentStep=1;buildSidebar();renderLesson();updateOverallProgress()}
let saveTimeout;function autoSaveJournal(){const el=document.getElementById('journalText');const c=document.getElementById('charCount');if(el&&c){c.textContent=el.value.length;clearTimeout(saveTimeout);saveTimeout=setTimeout(()=>{const l=moduleData.lessons[currentLesson];saveLessonProgress(l.id,{journal:el.value});const s=document.getElementById('journalSaved');if(s){s.classList.add('show');setTimeout(()=>s.classList.remove('show'),2000)}},500)}}
function completeRecount(){const el=document.getElementById('journalText');if(!el||el.value.trim().length<20){alert('Please write at least a few sentences sharing your reflection before continuing.');return}const l=moduleData.lessons[currentLesson];saveLessonProgress(l.id,{recount:true,journal:el.value});currentStep=2;buildSidebar();renderLesson();updateOverallProgress()}
function selectQuizOption(idx){const l=moduleData.lessons[currentLesson];const lp=getLessonProgress(l.id);if(lp.recertify)return;saveLessonProgress(l.id,{quizAnswer:idx,recertify:(idx===l.recertify.correct)});buildSidebar();renderLesson();updateOverallProgress();if(idx!==l.recertify.correct){setTimeout(()=>{saveLessonProgress(l.id,{quizAnswer:null,recertify:false})},2500)}}
function completeModule(){const m=document.getElementById('moduleCompleteModal');const nb=document.getElementById('modalNextBtn');const t=document.getElementById('modalTitle');const tx=document.getElementById('modalText');const il=moduleNum===2;if(il){t.textContent='Course Complete! \ud83c\udf89';tx.textContent='You\'ve completed all modules of AMASSED. Go lead with the fire of the Lord!';nb.style.display='none'}else{t.textContent='Module '+moduleNum+' Complete!';tx.textContent='You\'ve finished "'+moduleData.title+'". Ready for the next step?';nb.href='lesson.html?module='+(moduleNum+1);nb.textContent='Start Module '+(moduleNum+1)+' \u2192'}m.classList.add('show')}
function updateOverallProgress(){let t=0;let d=0;moduleData.lessons.forEach(l=>{const lp=getLessonProgress(l.id);t+=3;if(lp.remember)d++;if(lp.recount)d++;if(lp.recertify)d++});const p=t>0?Math.round((d/t)*100):0;const f=document.getElementById('topbarProgress');const tx=document.getElementById('topbarProgressText');if(f)f.style.width=p+'%';if(tx)tx.textContent=p+'%'}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
document.getElementById('moduleCompleteModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});
init();
</script>
