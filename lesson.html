<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMASSED | Course Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4A853;
            --gold-bright: #F0D78C;
            --black: #050505;
            --black-soft: #121212;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 350px;
            background: var(--black-soft);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .back-link {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            text-decoration: none;
            display: block;
            margin-bottom: 1rem;
        }

        .module-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 900;
        }

        .lesson-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .lesson-item {
            padding: 1.2rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .lesson-item:hover { background: rgba(255,255,255,0.02); }
        .lesson-item.active {
            background: rgba(212, 168, 83, 0.05);
            border-color: rgba(212, 168, 83, 0.2);
        }

        .lesson-item h4 { font-size: 0.9rem; margin-bottom: 0.5rem; }
        .progress-dots {
            display: flex;
            gap: 4px;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        .dot.done {
            background: var(--gold);
        }

        main {
            flex: 1;
            overflow-y: auto;
            background: var(--black);
            position: relative;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 6rem 2rem;
        }

        .rrr-nav {
            display: flex;
            gap: 1px;
            background: var(--glass-border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 4rem;
        }
        .rrr-tab {
            flex: 1;
            padding: 1rem;
            background: var(--black-soft);
            text-align: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            color: rgba(255,255,255,0.4);
        }
        .rrr-tab.active {
            background: var(--gold);
            color: #000;
        }

        .lesson-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 2rem;
        }

        .scripture-card {
            background: rgba(212, 168, 83, 0.05);
            border-left: 4px solid var(--gold);
            padding: 2rem;
            margin: 3rem 0;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #111;
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            margin: 2rem 0;
            outline: none;
            transition: var(--transition);
        }
        textarea:focus {
            border-color: var(--gold);
        }

        .btn {
            padding: 1.2rem 3rem;
            background: var(--gold);
            color: #000;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn:hover {
            background: var(--gold-bright);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            aside {
                width: 100%;
                height: auto;
            }
            .content-container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <a href="index.html" class="back-link">← Dashboard</a>
            <div class="module-title" id="moduleTitle">Module 00</div>
        </div>
        <div class="lesson-list" id="lessonList"></div>
    </aside>

    <main>
        <div class="content-container">
            <div class="rrr-nav">
                <div class="rrr-tab active" id="tab0" onclick="setStep(0)">Remember</div>
                <div class="rrr-tab" id="tab1" onclick="setStep(1)">Recount</div>
                <div class="rrr-tab" id="tab2" onclick="setStep(2)">Recertify</div>
            </div>

            <div class="lesson-content" id="lessonContent"></div>
        </div>
    </main>

    <script>
        const DATA = {
            0: {
                title: "Introductory Essentials",
                lessons: [
                    {
                        title: "The Joy of the Lord",
                        remember: "The Joy of the LORD is your strength (Nehemiah 8:10). This isn't just a feeling, it's a strategic foundation for leadership. From chilled meat to fresh BBQ - the fire of God's joy makes you ready to serve.",
                        recount: "Where have you seen the fire of God's joy turn a 'chilled' season into a 'ready' season?",
                        quiz: "What is the fuel of the BBQ in our analogy? (Answer: Joy)"
                    },
                    {
                        title: "The RRR Framework",
                        remember: "Remember the Word. Recount the Story. Recertify the Conviction. This is the cycle of transformation.",
                        recount: "Write about a time you remembered a promise and it changed your recount of a situation.",
                        quiz: "What does the first R stand for? (Answer: Remember)"
                    }
                ]
            },
            1: {
                title: "For Christ",
                lessons: [
                    {
                        title: "Grounding in Victory",
                        remember: "The battle is the Lord's. We lead FROM victory, not FOR it.",
                        recount: "Share a battle you handed back to Him.",
                        quiz: "Who does the battle belong to?"
                    },
                    {
                        title: "The Mission",
                        remember: "Everything we do is for His glory alone.",
                        recount: "How does 'For Christ' change your daily tasks?",
                        quiz: "What is the ultimate goal of Amassed?"
                    }
                ]
            },
            2: {
                title: "Christ Leads, Always",
                lessons: [
                    {
                        title: "Accuracy in Story",
                        remember: "God doesn't waste a hurt. Every peak and valley has a purpose.",
                        recount: "Recount a valley that became a peak later.",
                        quiz: "Does God waste a hurt?"
                    },
                    {
                        title: "Leading with Scars",
                        remember: "Your scars are proof of His healing and leadership.",
                        recount: "How can your scars help someone else lead?",
                        quiz: "Are scars something to hide?"
                    }
                ]
            }
        };

        let currentModule = new URLSearchParams(window.location.search).get('module') || 0;
        let currentLesson = 0;
        let currentStep = 0;

        function render() {
            const m = DATA[currentModule];
            if (!m) return;
            document.getElementById('moduleTitle').innerText = m.title;

            let lessonHtml = '';
            m.lessons.forEach((l, i) => {
                lessonHtml += `
                    <div class="lesson-item ${i == currentLesson ? 'active' : ''}" onclick="setLesson(${i})">
                        <h4>${l.title}</h4>
                        <div class="progress-dots">
                            <div class="dot done"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('lessonList').innerHTML = lessonHtml;

            const l = m.lessons[currentLesson];
            let content = `<h2>${l.title}</h2>`;

            if (currentStep === 0) {
                content += `<div class="scripture-card">${l.remember}</div><button class="btn" onclick="setStep(1)">Next Step</button>`;
            } else if (currentStep === 1) {
                content += `<p style="color: var(--gold); font-weight: 800; margin-bottom: 1rem;">THE RECOUNT PROMPT</p><p>${l.recount}</p><textarea placeholder="Type your story here..."></textarea><button class="btn" onclick="setStep(2)">Submit Recount</button>`;
            } else {
                content += `<p style="color: var(--gold); font-weight: 800; margin-bottom: 1rem;">RECERTIFY</p><p>${l.quiz}</p><div style="margin: 2rem 0;"><button class="btn" onclick="alert('Certified!')">Complete Lesson</button></div>`;
            }

            document.getElementById('lessonContent').innerHTML = content;

            for (let i = 0; i < 3; i++) {
                const tab = document.getElementById('tab' + i);
                if (tab) tab.className = 'rrr-tab' + (i == currentStep ? ' active' : '');
            }
        }

        function setLesson(i) {
            currentLesson = i;
            currentStep = 0;
            render();
        }

        function setStep(i) {
            currentStep = i;
            render();
        }

        render();
    </script>
</body>
</html>
