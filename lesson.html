<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>AMASSED • Learning Mode</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap' rel='stylesheet'>
    <style>
        :root {
            --gold: #D4A853; --orange-500: #f97316; --black: #050505; --black-light: #121212;
            --gray-400: #9ca3af; --white: #ffffff; --radius: 16px; --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --sidebar-width: 320px; --player-height: 80px;
        }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; line-height: 1.6; margin: 0; overflow-x: hidden; }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width); background: var(--black-light); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; transition: transform 0.4s; }
        .sidebar-header { padding: 2rem 1.5rem; border-bottom: 1px solid #222; }
        .sidebar-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; }
        .sidebar-back { font-size: 0.8rem; color: var(--gray-400); text-decoration: none; margin-top: 0.5rem; display: block; }
        .sidebar-modules { flex: 1; overflow-y: auto; padding: 1rem 0; }
        .mod-item { padding: 1rem 1.5rem; cursor: pointer; border-left: 3px solid transparent; transition: 0.3s; }
        .mod-item:hover { background: rgba(255,255,255,0.03); }
        .mod-item.active { background: rgba(212, 168, 83, 0.08); border-left-color: var(--gold); }
        .mod-title { font-size: 0.9rem; font-weight: 600; color: var(--gray-400); }
        .mod-item.active .mod-title { color: var(--white); }
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding-bottom: 100px; }
        .header { padding: 4rem 3rem 2rem; background: linear-gradient(to bottom, rgba(212,168,83,0.05), transparent); }
        .lesson-title { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 0; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reading-area { max-width: 800px; margin: 0 auto; padding: 2rem 3rem; }
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        h2.reveal { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-top: 2rem; }
        p.reveal { font-size: 1.1rem; color: #ccc; margin-bottom: 1.5rem; }
        .vid-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin-bottom: 2rem; border: 1px solid #333; }
        .vid-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid #222; }
        .btn-pag { padding: 0.8rem 1.5rem; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-pag:hover:not(:disabled) { background: #222; border-color: var(--gold); }
        .btn-pag:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { font-size: 0.8rem; font-weight: 800; color: var(--gray-400); letter-spacing: 1px; }
        .sticky-player { position: fixed; bottom: 0; left: var(--sidebar-width); right: 0; height: var(--player-height); background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-top: 1px solid #222; display: flex; align-items: center; padding: 0 2rem; z-index: 1000; }
        .player-info { flex: 1; }
        .player-title { font-size: 0.85rem; font-weight: 700; color: var(--gold); }
        .player-controls { display: flex; gap: 1.5rem; align-items: center; }
        .btn-play { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--gold); color: #000; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        
        @media (max-width: 1024px) { 
            .sidebar { transform: translateX(-100%); } 
            .main-content { margin-left: 0; } 
            .sticky-player { left: 0; } 
        }
    </style>
    <script>
        var MODULE_PAGES = [
            [`<div class='reveal'><h2>Loading Content...</h2><p>Please ensure curriculum_data.js is present.</p></div>`]
        ];
    </script>
    <script src='curriculum_data.js'></script>
</head>
<body>
  <div class='app-layout'>
    <aside class='sidebar'>
      <div class='sidebar-header'><div class='sidebar-logo'>AMASSED</div><a href='index.html' class='sidebar-back'>← Back to Portal</a></div>
      <nav class='sidebar-modules' id='modList'></nav>
    </aside>
    <main class='main-content'>
      <div class='header'><h1 class='lesson-title' id='lessonTitle'></h1></div>
      <div class='reading-area' id='readingArea'></div>
    </main>
    <div class='sticky-player'>
      <div class='player-info'><div class='player-title' id='playerTitle'></div><div style='font-size:0.7rem; color:#666;'>Audio Companion Active</div></div>
      <div class='player-controls'>
        <button class='btn-pag' onclick='navigateModule(currentMod-1)'>⏮</button>
        <button class='btn-play' id='playBtn' onclick='toggleAudio()'>▶</button>
        <button class='btn-pag' onclick='navigateModule(currentMod+1)'>⏭</button>
      </div>
    </div>
  </div>
  <script>
    const modules = [
      { id: 0, title: 'Introductory Essentials', audio: 'https://battlefield.buzzsmart.org/audio/intro.mp3' },
      { id: 1, title: 'Chapter 1: For Christ', audio: 'https://battlefield.buzzsmart.org/audio/ch1.mp3' },
      { id: 2, title: 'Chapter 2: Christ Leads, Always', audio: 'https://battlefield.buzzsmart.org/audio/ch2.mp3' },
      { id: 3, title: 'Chapter 3: Back — Bring Them', audio: 'https://battlefield.buzzsmart.org/audio/ch3.mp3' },
      { id: 4, title: 'Chapter 4: Practice, Always', audio: 'https://battlefield.buzzsmart.org/audio/ch4.mp3' },
      { id: 5, title: 'Chapter 5: What About Us?', audio: 'https://battlefield.buzzsmart.org/audio/ch5.mp3' }
    ];

    let currentMod = 0, currentPage = 0, audio = null;

    function init() {
      // Auth check disabled temporarily so you can view your work live
      // const auth = localStorage.getItem('amassed_auth');
      // if (auth !== 'amassed2026') { location.href = 'index.html'; return; }

      const params = new URLSearchParams(window.location.search);
      currentMod = parseInt(params.get('module')) || 0;
      renderSidebar();
      navigateModule(currentMod);
    }

    function renderSidebar() {
      document.getElementById('modList').innerHTML = modules.map(m => 
        `<div class='mod-item ${m.id === currentMod ? 'active' : ''}' onclick='navigateModule(${m.id})'>
            <div class='mod-title'>${m.title}</div>
         </div>`
      ).join('');
    }

    function navigateModule(id) {
      if (id < 0 || id >= modules.length) return;
      currentMod = id; 
      currentPage = 0;
      const mod = modules[id];
      document.getElementById('lessonTitle').textContent = mod.title;
      document.getElementById('playerTitle').textContent = mod.title;
      
      if (audio) { audio.pause(); }
      audio = new Audio(mod.audio);
      document.getElementById('playBtn').textContent = '▶';
      
      renderSidebar(); 
      renderPage();
      window.history.replaceState({}, '', '?module=' + id);
    }

    function renderPage() {
      if (!window.MODULE_PAGES || !MODULE_PAGES[currentMod]) {
          document.getElementById('readingArea').innerHTML = "<p>Curriculum data is still loading or missing.</p>";
          return;
      }
      
      const pgs = MODULE_PAGES[currentMod];
      const content = pgs[currentPage];
      let html = content + `
        <div class='pagination reveal'>
            <button class='btn-pag' onclick='changePage(-1)' ${currentPage === 0 ? 'disabled' : ''}>❮ Previous</button>
            <span class='page-info'>PAGE ${currentPage+1} OF ${pgs.length}</span>
            <button class='btn-pag' onclick='changePage(1)' ${currentPage === pgs.length-1 ? 'disabled' : ''}>Next ❯</button>
        </div>`;
      
      document.getElementById('readingArea').innerHTML = html;
      
      // Trigger animations
      setTimeout(() => { 
        document.querySelectorAll('.reveal').forEach(el => { 
          el.classList.add('visible'); 
        }); 
      }, 100);
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changePage(dir) { 
        currentPage += dir; 
        renderPage(); 
    }

    function toggleAudio() {
      if (!audio) return;
      if (audio.paused) { 
          audio.play(); 
          document.getElementById('playBtn').textContent = '⏸'; 
      } else { 
          audio.pause(); 
          document.getElementById('playBtn').textContent = '▶'; 
      }
    }

    init();
  </script>
</body>
</html>
