<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Learning Portal</title>
    <style>
        :root { --gold: #D4A853; --orange: #f97316; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        #content { flex: 1; display: flex; flex-direction: column; background: #000; }
        .header-tools { padding: 1rem 2rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        .ebook-box { flex: 1; overflow-y: auto; padding: 4rem; scroll-behavior: smooth; }
        .reading-width { max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1.25rem; color: #ccc; }
        .audio-player { padding: 1.5rem 3rem; background: #111; border-top: 1px solid var(--gold); display: flex; align-items: center; justify-content: space-between; }
        .jump-select { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .nav-item { padding: 1rem 2rem; border-bottom: 1px solid #111; cursor: pointer; color: #777; }
        .nav-item.active { background: #111; color: var(--gold); border-left: 4px solid var(--gold); }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div style="padding: 2rem; border-bottom: 1px solid #222;"><a href="index.html" style="color:var(--orange); text-decoration:none; font-weight:900; font-size:1.5rem;">AMASSED</a></div>
        <div id="moduleList" style="overflow-y:auto;"></div>
    </aside>
    <main id="content">
        <header class="header-tools">
            <input type="text" id="search" style="background:#111; border:1px solid #333; color:white; padding:10px 20px; border-radius:30px; width:300px;" placeholder="Search eBook material..." onkeyup="searchContent()">
            <select id="jumpMenu" class="jump-select" onchange="loadModule(this.value)"></select>
        </header>
        <div class="ebook-box" id="scroller">
            <div class="reading-width">
                <h1 id="title" style="color:var(--gold); font-family:'Playfair Display'; font-size: 3.5rem; margin-bottom: 2rem;"></h1>
                <div id="bodyText"></div>
            </div>
        </div>
        <div class="audio-player">
            <div id="audioTitle" style="color:var(--gold); font-weight:bold;">Chapter Audio</div>
            <button id="playBtn" onclick="toggleAudio()" style="background:var(--gold); padding: 15px 30px; border:none; border-radius:8px; font-weight:900; cursor:pointer; color:black;">PLAY AUDIO</button>
        </div>
    </main>
    <script src="curriculum_data.js"></script>
    <script>
        let audio = null;
        let currentIdx = 0;
        function loadModule(id) {
            currentIdx = id;
            const data = MODULE_DATA[id];
            document.getElementById('title').innerText = data.title;
            document.getElementById('audioTitle').innerText = data.title;
            document.getElementById('bodyText').innerHTML = data.content;
            document.getElementById('scroller').scrollTop = 0;
            if(audio) audio.pause();
            audio = new Audio(data.audio);
            document.getElementById('playBtn').innerText = 'PLAY AUDIO';
            document.querySelectorAll('.nav-item').forEach((el, idx) => el.classList.toggle('active', idx == id));
        }
        function toggleAudio() {
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = 'PAUSE'; }
            else { audio.pause(); document.getElementById('playBtn').innerText = 'PLAY'; }
        }
        function searchContent() {
            let val = document.getElementById('search').value.toLowerCase();
            document.getElementById('bodyText').innerHTML = MODULE_DATA[currentIdx].content.replace(new RegExp(val, 'gi'), m => `<mark style="background:var(--orange); color:black;">${m}</mark>`);
        }
        MODULE_DATA.forEach((mod, index) => {
            document.getElementById('moduleList').innerHTML += `<div class="nav-item" onclick="loadModule(${index})">${mod.title}</div>`;
            document.getElementById('jumpMenu').innerHTML += `<option value="${index}">${mod.title}</option>`;
        });
        loadModule(0);
    </script>
</body>

</html>
