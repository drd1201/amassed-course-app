<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f97316; --gold: #D4A853; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; display: flex; height: 100vh; margin: 0; }
        
        #sidebar { width: 320px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        #sidebar-header { padding: 2rem; border-bottom: 1px solid #222; }
        .nav-item { padding: 1rem 2rem; border-bottom: 1px solid #111; cursor: pointer; transition: 0.3s; color: #888; }
        .nav-item:hover, .nav-item.active { background: #111; color: var(--gold); border-left: 4px solid var(--gold); }

        #content { flex: 1; padding: 4rem; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .reading-area { max-width: 800px; width: 100%; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); }
        
        .audio-player { position: fixed; bottom: 0; left: 320px; right: 0; background: rgba(15,15,15,0.95); backdrop-filter: blur(10px); padding: 1.5rem 3rem; border-top: 1px solid var(--gold); display: flex; align-items: center; justify-content: space-between; }
        .play-btn { background: var(--gold); border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header"><a href="index.html" style="color:var(--orange); text-decoration:none; font-family:'Playfair Display'; font-size:1.5rem; font-weight:900;">AMASSED</a></div>
        <div id="moduleList"></div>
    </div>
    
    <div id="content">
        <div class="reading-area">
            <h1 id="title">Loading...</h1>
            <div id="textBody" style="font-size:1.1rem; line-height:1.8; color:#ccc;"></div>
        </div>
    </div>

    <div class="audio-player">
        <div>
            <div id="playerTitle" style="font-weight:700; color:var(--gold);">Chapter Title</div>
            <div style="font-size:0.8rem; color:#666;">Audio Companion</div>
        </div>
        <button class="play-btn" id="playBtn" onclick="toggleAudio()">PLAY AUDIO</button>
    </div>

    <script src="curriculum_data.js"></script>
    <script>
        let audio = null;
        function loadModule(id) {
            const data = MODULE_DATA[id];
            document.getElementById('title').innerText = data.title;
            document.getElementById('playerTitle').innerText = data.title;
            document.getElementById('textBody').innerHTML = data.content;
            if(audio) audio.pause();
            audio = new Audio(data.audio);
            document.getElementById('playBtn').innerText = 'PLAY AUDIO';
            
            // Update active state in sidebar
            document.querySelectorAll('.nav-item').forEach((el, idx) => {
                el.classList.toggle('active', idx === id);
            });
        }

        const list = document.getElementById('moduleList');
        MODULE_DATA.forEach((mod, index) => {
            list.innerHTML += `<div class="nav-item" onclick="loadModule(${index})">${mod.title}</div>`;
        });

        function toggleAudio() {
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = 'PAUSE'; }
            else { audio.pause(); document.getElementById('playBtn').innerText = 'PLAY'; }
        }

        // Initialize first module
        const params = new URLSearchParams(window.location.search);
        const startMod = parseInt(params.get('module')) || 0;
        loadModule(startMod);
    </script>
</body>
</html>
