<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Learning Portal</title>
    <style>
        :root { --gold: #D4A853; --orange: #f97316; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 320px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        #content { flex: 1; display: flex; flex-direction: column; background: #000; }
        
        .header-tools { padding: 1rem 2rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .ebook-box { flex: 1; overflow-y: auto; padding: 4rem; scroll-behavior: smooth; }
        .reading-width { max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1.25rem; color: #ccc; }
        
        .audio-player { padding: 1.5rem 3rem; background: #111; border-top: 1px solid var(--gold); display: flex; align-items: center; justify-content: space-between; }
        .jump-select { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div style="padding: 2rem; border-bottom: 1px solid #222; color:var(--orange); font-weight:900;">AMASSED HUB</div>
        <div id="moduleList" style="overflow-y:auto;"></div>
    </aside>
    <main id="content">
        <header class="header-tools">
            <input type="text" placeholder="Search course material..." id="search" style="background:#111; border:1px solid #333; color:white; padding:10px; border-radius:20px; width:300px;">
            <select id="jumpMenu" class="jump-select" onchange="loadModule(this.value)"></select>
        </header>
        <div class="ebook-box" id="scroller">
            <div class="reading-width">
                <h1 id="title" style="color:var(--gold); font-family:'Playfair Display'; font-size: 3rem;"></h1>
                <div id="bodyText"></div>
            </div>
        </div>
        <div class="audio-player">
            <div id="audioTitle" style="color:var(--gold); font-weight:bold;">Chapter Audio</div>
            <button onclick="toggleAudio()" style="background:var(--gold); padding: 15px 30px; border:none; border-radius:8px; font-weight:900; cursor:pointer;">PLAY AUDIO</button>
        </div>
    </main>
    <script src="curriculum_data.js"></script>
    <script>
        let audio = null;
        function loadModule(id) {
            const data = MODULE_DATA[id];
            document.getElementById('title').innerText = data.title;
            document.getElementById('bodyText').innerHTML = data.content;
            document.getElementById('scroller').scrollTop = 0;
            if(audio) audio.pause();
            audio = new Audio(data.audio);
        }
        // Build navigation from the NotebookLM data file
        MODULE_DATA.forEach((mod, index) => {
            document.getElementById('moduleList').innerHTML += `<div onclick="loadModule(${index})" style="padding:1rem 2rem; border-bottom:1px solid #111; cursor:pointer;">${mod.title}</div>`;
            document.getElementById('jumpMenu').innerHTML += `<option value="${index}">${mod.title}</option>`;
        });
        loadModule(0);
    </script>
</body>
</html>
