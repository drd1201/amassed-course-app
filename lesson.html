<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Classroom Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4A853; --orange: #f97316; --bg: #fdfdfd; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; }
        .mod-btn { padding: 1.2rem 2rem; border: none; border-bottom: 1px solid #f5f5f5; cursor: pointer; color: #888; font-weight: 700; transition: 0.3s; text-align: left; background: none; }
        .mod-btn:hover, .mod-btn.active { color: var(--orange); background: #fafafa; border-left: 4px solid var(--orange); }
        #content { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        .header-tools { padding: 1.5rem 3rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .scroller-box { flex: 1; overflow-y: auto; padding: 4rem; background: #fff; margin: 1.5rem; border: 1px solid #eee; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .reading-width { max-width: 700px; margin: 0 auto; line-height: 1.9; font-size: 1.2rem; color: #444; }
        .audio-dock { padding: 1.5rem 3rem; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .jump-select { background: #fff; color: var(--text); border: 1px solid #ddd; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .epub-link { background: var(--orange); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: 900; }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div style="padding: 2.5rem; border-bottom: 1px solid #eee;"><a href="index.html" style="color:var(--orange); text-decoration:none; font-weight:900; font-size:1.5rem;">AMASSED</a></div>
        <div id="moduleList">
            <button class="mod-btn active" onclick="loadModule(0)">Introductory Essentials</button>
            <button class="mod-btn" onclick="loadModule(5)">Module 1: The Battlefield</button>
        </div>
    </aside>
    <main id="content">
        <header class="header-tools">
            <h2 id="mTitle" style="color:var(--text); font-family:'Playfair Display'; margin:0;"></h2>
            <div style="display: flex; gap: 20px; align-items: center;">
                <a href="https://notebooklm.google.com/notebook/25e90209-791c-4f6e-9506-aedb0e3cfb2f" target="_blank" class="epub-link">OPEN NOTEBOOK SOURCE</a>
                <select id="jumpMenu" class="jump-select" onchange="loadModule(parseInt(this.value))"></select>
            </div>
        </header>
        <div class="scroller-box" id="pageScroller">
            <div class="reading-width" id="mBody"></div>
        </div>
        <div class="audio-dock">
            <div><span id="aTitle" style="font-weight:bold; color:var(--orange);"></span><br><small style="color:#999;">Strategic Audio Companion</small></div>
            <button id="playBtn" onclick="toggleAudio()" style="background:var(--text); color:white; padding: 1rem 2.5rem; border:none; border-radius:8px; font-weight:900; cursor:pointer;">PLAY AUDIO</button>
        </div>
    </main>
    <script src="curriculum_data.js"></script>
    <script>
        let audio = null;
        function loadModule(id) {
            const data = MODULE_DATA[id];
            document.getElementById('mTitle').innerText = data.title;
            document.getElementById('aTitle').innerText = data.title;
            document.getElementById('mBody').innerHTML = data.content;
            document.getElementById('pageScroller').scrollTop = 0;
            document.getElementById('jumpMenu').value = id;
            if(audio) { audio.pause(); audio = null; }
            audio = new Audio(data.audio);
            document.getElementById('playBtn').innerText = 'PLAY AUDIO';
        }
        function toggleAudio() {
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = 'PAUSE'; }
            else { audio.pause(); document.getElementById('playBtn').innerText = 'PLAY'; }
        }
        const jump = document.getElementById('jumpMenu');
        MODULE_DATA.forEach((mod, index) => {
            jump.innerHTML += `<option value="${index}">${mod.title}</option>`;
        });
        loadModule(0);
    </script>
</body>
</html>
