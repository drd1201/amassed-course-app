<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMASSED • Learning Mode</title>
    <meta name="description" content="AMASSED Learning Mode: Inside the Course experience for Battlefield Discipleship.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
    /* ========= RESET & BASE ========= */
    *, ::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --orange-50: #fff7ed; --orange-100: #ffedd5; --orange-200: #fed7aa; --orange-300: #fdbba74; --orange-400: #fb923c; --orange-500: #f97316; --orange-600: #ea580c; --orange-700: #c2410c;
        --black: #0a0a0a; --black-light: #141414; --black-card: #1a1a1a; --black-border: #2a2a2a;
        --gray-400: #9ca3af; --gray-300: #d1d5db; --gray-200: #e5e7eb; --white: #ffffff;
        --radius: 16px; --radius-sm: 10px; --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --sidebar-width: 320px; --player-height: 80px; --teal-500: #14b8a6; --teal-300: #5eeae4;
    }
    html { scroll-behavior: smooth; }
    body {
        font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); line-height: 1.6; overflow-x: hidden;
        min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ========= LAYOUT ========= */
    .app-layout { display: flex; min-height: 100vh; }

    /* ========= SIDEBAR ========= */
    .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width); background: var(--black-light);
        border-right: 1px solid var(--black-border); display: flex; flex-direction: column; z-index: 50; transition: transform var(--transition);
    }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--black-border); }
    .sidebar-logo { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 900; color: var(--orange-500); margin-bottom: 0.25rem; }
    .sidebar-back { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--gray-400); cursor: pointer; }
    .sidebar-progress { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--black-border); }
    .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange-600), var(--orange-400)); width: 0%; transition: width 0.6s ease; }
    .sidebar-greeting { padding: 1rem 1.5rem; font-size: 0.85rem; color: var(--gray-300); }
    .sidebar-modules { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    .sidebar-module-item { display: flex; align-items: center; gap: 0.85rem; padding: 0.9rem 1.5rem; cursor: pointer; border-left: 3px solid transparent; }
    .sidebar-module-item.active { background: rgba(249,115,22,0.08); border-left-color: var(--orange-500); }
    .mod-info-title { font-size: 0.88rem; font-weight: 600; color: var(--gray-200); }

    /* ========= MAIN CONTENT ========= */
    .main-content { flex: 1; margin-left: var(--sidebar-width); padding-bottom: calc(var(--player-height) + 2rem); min-height: 100vh; }
    .lesson-header { padding: 3rem; background: linear-gradient(180deg, rgba(249,115,22,0.04) 0%, transparent 100%); }
    .lesson-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; margin-bottom: 0.75rem; background: linear-gradient(135deg, var(--white) 0%, var(--orange-200) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .reading-area { max-width: 800px; margin: 0 auto; padding: 0 3rem 3rem; min-height: 50vh; }
    .page-content { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .vid-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: var(--radius); margin: 2rem 0; background: #000; border: 1px solid var(--black-border); }
    .vid-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    blockquote { margin: 2rem 0; padding: 1.5rem; border-left: 4px solid var(--orange-500); background: rgba(249,115,22,0.04); font-style: italic; color: var(--orange-200); font-size: 1.1rem; }
    .traits-table { width: 100%; border-collapse: collapse; margin: 2rem 0; background: var(--black-card); border: 1px solid var(--black-border); border-radius: var(--radius); overflow: hidden; }
    .traits-table th, .traits-table td { padding: 1rem; border: 1px solid var(--black-border); text-align: left; font-size: 0.9rem; }
    .traits-table th { background: rgba(249,115,22,0.1); color: var(--orange-400); }

    /* ========= PAGINATION CONTROLS ========= */
    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 3rem; padding: 2rem 0; border-top: 1px solid var(--black-border); }
    .pag-btn { padding: 0.8rem 1.5rem; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; border: 1px solid var(--black-border); background: var(--black-light); color: var(--white); transition: all var(--transition); display: flex; align-items: center; gap: 0.5rem; }
    .pag-btn:hover:not(:disabled) { border-color: var(--orange-500); color: var(--orange-400); }
    .pag-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-indicator { font-size: 0.85rem; font-weight: 600; color: var(--gray-400); letter-spacing: 0.1em; }

    /* ========= STICKY AUDIO PLAYER ========= */
    .sticky-player { position: fixed; bottom: 0; left: var(--sidebar-width); right: 0; height: var(--player-height); background: rgba(14,14,14,0.96); backdrop-filter: blur(24px); border-top: 1px solid var(--black-border); z-index: 40; display: flex; align-items: center; padding: 0 2rem; gap: 1.5rem; transition: left var(--transition); }
    .player-info { flex-shrink: 0; min-width: 150px; }
    .player-info-title { font-size: 0.85rem; font-weight: 700; color: var(--white); }
    .player-controls { display: flex; align-items: center; gap: 0.75rem; }
    .player-btn { width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.06); color: var(--white); font-size: 1rem; transition: var(--transition); }
    .player-btn:hover { background: rgba(255,255,255,0.12); }
    .player-btn-play { background: var(--orange-500); width: 44px; height: 44px; }
    .player-progress-section { flex: 1; display: flex; align-items: center; gap: 1rem; }
    .player-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 6px; cursor: pointer; position: relative; }
    .player-track-fill { height: 100%; background: linear-gradient(90deg, var(--orange-600), var(--orange-400)); border-radius: 6px; width: 0%; }
    .player-time { font-size: 0.75rem; color: var(--gray-400); font-family: monospace; }

    @media (max-width: 1024px) {
        .sidebar { transform: translateX(-100%); }
        .sidebar.open { transform: translateX(0); }
        .main-content { margin-left: 0; }
        .sticky-player { left: 0; }
        .reading-area { padding: 1.5rem; }
    }
    </style>
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">AMASSED</div>
                <a href="index.html" class="sidebar-back">❮ Back to Portal</a>
            </div>
            <div class="sidebar-progress">
                <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            </div>
            <div class="sidebar-greeting">Welcome back, <strong id="userName">Dana</strong> 🍃</div>
            <nav class="sidebar-modules" id="sidebarModules"></nav>
        </aside>

        <main class="main-content">
            <div class="lesson-header">
                <h1 class="lesson-title" id="lessonTitle">Loading...</h1>
            </div>
            <div class="reading-area" id="readingArea"></div>
        </main>

        <div class="sticky-player" id="stickyPlayer">
            <div class="player-info">
                <div class="player-info-title" id="playerTitle">Module Audio</div>
                <div class="player-time"><span id="playerCurrent">0:00</span> / <span id="playerDuration">0:00</span></div>
            </div>
            <div class="player-controls">
                <button class="player-btn" onclick="navigateModule(currentMod - 1)" title="Previous Module">⏮</button>
                <button class="player-btn" onclick="skipAudio(-15)">⏪</button>
                <button class="player-btn player-btn-play" id="playBtn" onclick="toggleAudio()">▶</button>
                <button class="player-btn" onclick="skipAudio(15)">⏩</button>
                <button class="player-btn" onclick="navigateModule(currentMod + 1)" title="Next Module">⏭</button>
            </div>
            <div class="player-progress-section">
                <div class="player-track" onclick="seekAudio(event)"><div class="player-track-fill" id="playerFill"></div></div>
            </div>
        </div>
    </div>

    <script>
    const MODULES = [
        {
            id: 0, title: "Introductory Essentials", 
            audio: "https://battlefield.buzzsmart.org/audio/intro.mp3",
            pages: [
                `<h2>The Mission in Motion</h2><p>Welcome to AMASSED. Watch the introductory mission video below to ground your perspective on the battlefield ahead.</p><div class="vid-wrap"><iframe src="https://www.youtube.com/embed/l--hVwx4CDM" allowfullscreen></iframe></div>`,
                `<h2>The Joy of the Lord Is Your Strength</h2><p>Nehemiah 8:10 declares, “Do not grieve, for the joy of the Lord is your strength.” This isn't a fleeting happiness tied to circumstances.</p><blockquote>“The joy of the Lord is not the absence of struggle. It is the presence of God in the middle of it.”</blockquote>`,
                `<h2>The RRR Framework</h2><p>The entire curriculum is built on: <strong>Remember, Recount, Recertify</strong>.</p><ul><li><strong>Remember</strong> – Anchor in God’s promises.</li><li><strong>Recount</strong> – Share the testimonies.</li><li><strong>Recertify</strong> – Renew your commitment.</li></ul>`,
                `<h2>Chilled Meat vs. Fresh BBQ</h2><p>Imagine stale, cold meat in a fridge. Now imagine it on a sizzling grill. This is the new birth in Christ. Don't lead like chilled meat; lead with the fire of the Spirit!</p>`
            ]
        },
        {
            id: 1, title: "Chapter 1: For Christ", 
            audio: "https://battlefield.buzzsmart.org/audio/ch1.mp3",
            pages: [
                `<h2>Leading FROM Victory</h2><p>In the Kingdom, we don’t fight FOR victory. We lead FROM the reality that the victory is already won on the cross.</p>`,
                `<h2>Strategic Amnesia</h2><p>In the heat of battle, we are prone to amnesia. We forget the Red Sea crossings. We must deliberately Remember His Word to ground our leadership.</p>`
            ]
        },
        {
            id: 2, title: "Chapter 2: Christ Leads, Always", 
            audio: "https://battlefield.buzzsmart.org/audio/ch2.mp3",
            pages: [
                `<h2>The Integrity of the Story</h2><p>We are called to recount His leadership with <strong>Accuracy, Joy, and Transparency</strong>.</p>`,
                `<h2>God Does Not Waste a Hurt</h2><p>Every hardship is material for a future testimony. Your pain is the portal through which Christ's power enters.</p>`
            ]
        },
        {
            id: 3, title: "Chapter 3: Back — Bring Them", 
            audio: "https://battlefield.buzzsmart.org/audio/ch3.mp3",
            pages: [
                `<h2>The Ministry of Recertification</h2><p>Making known the presence of Christ so clearly that hearts are brought back to Him through Language, Sacrifice, and Love.</p>`,
                `<h2>The Story of Red the Elder</h2><p>A stark reminder of the urgency of recertification. The mission of bringing them back is NOW.</p>`
            ]
        },
        {
            id: 4, title: "Chapter 4: Practice, Always", 
            audio: "https://battlefield.buzzsmart.org/audio/ch4.mp3",
            pages: [
                `<h2>The Cave Analogy</h2><p>Moving from the deepest, darkest spot in a cave toward the radiant sunlight of the entrance. It's a series of deliberate steps.</p>`,
                `<h2>Five Pillars of Practice</h2><p>1. Be Still | 2. Forgiveness | 3. Service | 4. Courage | 5. Fellowship.</p><blockquote>“Spiritual maturity is not knowing more. It is practicing more of what you already know.”</blockquote>`
            ]
        },
        {
            id: 5, title: "Chapter 5: What About Us?", 
            audio: "https://battlefield.buzzsmart.org/audio/ch5.mp3",
            pages: [
                `<h2>The 14 Leadership Traits</h2><p>Every Battlefield Disciple must develop these core character traits:</p>
                <table class="traits-table">
                    <thead><tr><th>Trait</th><th>Definition</th></tr></thead>
                    <tbody>
                        <tr><td><strong>Bearing</strong></td><td>Conduct that creates a favorable impression.</td></tr>
                        <tr><td><strong>Courage</strong></td><td>Recognizing fear but proceeding with calmness.</td></tr>
                        <tr><td><strong>Decisiveness</strong></td><td>Making decisions promptly and forcefully.</td></tr>
                        <tr><td><strong>Dependability</strong></td><td>The certainty of proper performance of duty.</td></tr>
                        <tr><td><strong>Endurance</strong></td><td>Stamina to withstand pain and stress.</td></tr>
                        <tr><td><strong>Enthusiasm</strong></td><td>Sincere interest and exuberance.</td></tr>
                        <tr><td><strong>Initiative</strong></td><td>A self-starter in the absence of orders.</td></tr>
                        <tr><td><strong>Integrity</strong></td><td>The Prime Factor: Uprightness of character.</td></tr>
                        <tr><td><strong>Judgment</strong></td><td>Weighing facts to make sound decisions.</td></tr>
                        <tr><td><strong>Justice</strong></td><td>Giving rewards/punishments according to merits.</td></tr>
                        <tr><td><strong>Knowledge</strong></td><td>Understanding of the Word and the mission.</td></tr>
                        <tr><td><strong>Loyalty</strong></td><td>Faithfulness to the team and mission.</td></tr>
                        <tr><td><strong>Tact</strong></td><td>Dealing with others without creating offense.</td></tr>
                        <tr><td><strong>Unselfishness</strong></td><td>Avoiding comfort at the expense of others.</td></tr>
                    </tbody>
                </table>`,
                `<h2>The Chopstick Moment</h2><p>True leadership is found in the smallest acts of care and the most hidden moments of integrity. God is in the details.</p>`
            ]
        }
    ];

    let currentMod = 0;
    let currentPage = 0;
    let audio = null;
    let isPlaying = false;

    function init() {
        const auth = localStorage.getItem('amassed_auth');
        if (auth !== 'amassed2026') { location.href = 'index.html'; return; }
        
        const params = new URLSearchParams(window.location.search);
        currentMod = parseInt(params.get('module')) || 0;
        currentPage = 0;

        renderSidebar();
        navigateModule(currentMod);
    }

    function renderSidebar() {
        const nav = document.getElementById('sidebarModules');
        nav.innerHTML = MODULES.map(m => `
            <div class="sidebar-module-item ${m.id === currentMod ? 'active' : ''}" onclick="navigateModule(${m.id})">
                <div class="mod-info"><div class="mod-info-title">${m.title}</div></div>
            </div>
        `).join('');
    }

    function navigateModule(id) {
        if (id < 0 || id >= MODULES.length) return;
        currentMod = id;
        currentPage = 0;
        const mod = MODULES[id];

        document.getElementById('lessonTitle').innerText = mod.title;
        document.getElementById('playerTitle').innerText = mod.title;
        
        // Update Sidebar
        document.querySelectorAll('.sidebar-module-item').forEach((el, i) => {
            el.classList.toggle('active', i === id);
        });

        // Audio Setup
        if (audio) { audio.pause(); isPlaying = false; document.getElementById('playBtn').innerText = '▶'; }
        audio = new Audio(mod.audio);
        audio.addEventListener('loadedmetadata', () => document.getElementById('playerDuration').innerText = formatTime(audio.duration));
        audio.addEventListener('timeupdate', updateAudioProgress);

        renderPage();
        window.history.pushState({}, '', `?module=${id}`);
    }

    function renderPage() {
        const mod = MODULES[currentMod];
        const content = mod.pages[currentPage];
        
        const paginationHtml = `
            <div class="pagination">
                <button class="pag-btn" onclick="changePage(-1)" ${currentPage === 0 ? 'disabled' : ''}>❮ Previous Page</button>
                <span class="page-indicator">PAGE ${currentPage + 1} OF ${mod.pages.length}</span>
                <button class="pag-btn" onclick="changePage(1)" ${currentPage === mod.pages.length - 1 ? 'disabled' : ''}>Next Page ❯</button>
            </div>
        `;

        document.getElementById('readingArea').innerHTML = `<div class="page-content">${content}</div>` + paginationHtml;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changePage(dir) {
        currentPage += dir;
        renderPage();
    }

    /* AUDIO LOGIC */
    function toggleAudio() {
        if (isPlaying) { audio.pause(); document.getElementById('playBtn').innerText = '▶'; }
        else { audio.play(); document.getElementById('playBtn').innerText = '⏸'; }
        isPlaying = !isPlaying;
    }
    function skipAudio(amt) { audio.currentTime += amt; }
    function seekAudio(e) { const pct = (e.clientX - e.target.getBoundingClientRect().left) / e.target.offsetWidth; audio.currentTime = pct * audio.duration; }
    function updateAudioProgress() {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('playerFill').style.width = pct + '%';
        document.getElementById('playerCurrent').innerText = formatTime(audio.currentTime);
    }
    function formatTime(secs) {
        const m = Math.floor(secs / 60); const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    init();
    </script>
</body>
</html>
