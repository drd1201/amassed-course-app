<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Classroom Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4A853; --orange: #f97316; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 300px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        #content { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        
        .header-tools { padding: 1.5rem 3rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #050505; z-index: 10; }
        
        /* SCROLLABLE TEXT BOX (The Actual Writing) */
        .scroller-box { flex: 1; overflow-y: auto; padding: 4rem; background: radial-gradient(circle at top, #111 0%, #000 100%); margin: 1.5rem; border: 1px solid #111; border-radius: 12px; }
        .reading-width { max-width: 750px; margin: 0 auto; line-height: 1.9; font-size: 1.25rem; color: #ccc; }
        
        .audio-dock { padding: 1.5rem 3rem; background: rgba(10,10,10,0.98); border-top: 1px solid var(--gold); display: flex; align-items: center; justify-content: space-between; }
        .jump-select { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; min-width: 250px; }
        
        .nav-item { padding: 1rem 2rem; border-bottom: 1px solid #111; cursor: pointer; color: #555; transition: 0.3s; }
        .nav-item.active { background: #111; color: var(--gold); border-left: 4px solid var(--gold); }
        mark { background: var(--orange); color: black; border-radius: 3px; }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div style="padding: 2.5rem; border-bottom: 1px solid #222;"><a href="index.html" style="color:var(--orange); text-decoration:none; font-weight:900; font-size:1.5rem;">AMASSED</a></div>
        <div id="moduleList"></div>
    </aside>
    
    <main id="content">
        <header class="header-tools">
            <h2 id="mTitle" style="color:var(--gold); font-family:'Playfair Display'; margin:0;"></h2>
            <select id="jumpMenu" class="jump-select" onchange="loadModule(parseInt(this.value))">
                </select>
        </header>

        <div class="scroller-box" id="pageScroller">
            <div class="reading-width">
                <p style="color:var(--gold); font-weight: 800; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2rem;">Follow along with the audio for quiz review</p>
                <div id="mBody"></div>
            </div>
        </div>

        <div class="audio-dock">
            <div><span id="aTitle" style="color:var(--gold); font-weight:bold;"></span><br><small style="color:#444;">Strategic Audio Companion Active</small></div>
            <button id="playBtn" onclick="toggleAudio()" style="background:var(--gold); padding: 1rem 2.5rem; border:none; border-radius:8px; font-weight:900; cursor:pointer; color: black;">PLAY AUDIO</button>
        </div>
    </main>

    <script src="curriculum_data.js"></script>
    <script>
        let audio = null;
        let currentId = 0;

        function loadModule(id) {
            currentId = id;
            const data = MODULE_DATA[id];
            document.getElementById('mTitle').innerText = data.title;
            document.getElementById('aTitle').innerText = data.title;
            document.getElementById('mBody').innerHTML = data.content;
            document.getElementById('pageScroller').scrollTop = 0;
            document.getElementById('jumpMenu').value = id;

            if(audio) { audio.pause(); audio = null; }
            audio = new Audio(data.audio);
            document.getElementById('playBtn').innerText = 'PLAY AUDIO';

            document.querySelectorAll('.nav-item').forEach((el, idx) => el.classList.toggle('active', idx === id));
            window.history.replaceState(null, null, `?page=${id}`);
        }

        function toggleAudio() {
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = 'PAUSE'; }
            else { audio.pause(); document.getElementById('playBtn').innerText = 'PLAY'; }
        }

        // Build Nav and Jump Menu
        const list = document.getElementById('moduleList');
        const jump = document.getElementById('jumpMenu');
        MODULE_DATA.forEach((mod, index) => {
            list.innerHTML += `<div class="nav-item" onclick="loadModule(${index})">${mod.title}</div>`;
            jump.innerHTML += `<option value="${index}">${mod.title}</option>`;
        });

        const params = new URLSearchParams(window.location.search);
        loadModule(parseInt(params.get('page')) || 0);
    </script>
</body>
</html>
