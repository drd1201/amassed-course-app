<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Briefing • AMASSED</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f97316; --dark: #050505; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            background: #fff url('bg.png') no-repeat center center fixed;
            background-size: cover;
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2); /* Soft blend with background image */
            backdrop-filter: blur(5px);
            padding: 20px;
        }

        .briefing-panel {
            background: rgba(255, 255, 255, 0.9);
            max-width: 900px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            padding: 3rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 0; color: var(--dark); text-transform: uppercase; }
        .briefing-tag { color: var(--orange); font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-top: 0.5rem; margin-bottom: 2.5rem; }

        .video-box {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .instruction-p { color: #555; line-height: 1.6; font-size: 1.1rem; margin-bottom: 3rem; max-width: 700px; margin-left: auto; margin-right: auto; }

        /* The Access Control Area */
        .gateway-actions { 
            background: #fcfcfc; 
            padding: 2rem; 
            border-radius: 12px; 
            border: 1px solid #eee; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 1.5rem;
        }

        .btn-donate { 
            background: var(--orange); 
            color: white; 
            padding: 1.2rem 2.5rem; 
            border-radius: 50px; 
            font-weight: 900; 
            text-decoration: none; 
            font-size: 1.1rem; 
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
            border: none;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-donate:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(249, 115, 22, 0.6); }

        .btn-access {
            display: none; /* Hidden until donation clicked */
            margin-top: 1rem;
            color: var(--orange);
            font-weight: 900;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-access:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="briefing-panel">
            <h1>AMASSED</h1>
            <div class="briefing-tag">Strategic Gateway</div>

            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID?rel=0" allowfullscreen></iframe>
            </div>

            <p class="instruction-p">
                Before accessing the core intelligence hub, please support the mission. This curriculum relies on donations—we suggest $5.02 to cover infrastructure costs, or any amount you feel is appropriate.
            </p>

            <div class="gateway-actions">
                <a href="https://www.paypal.com/ncp/payment/8M9SA2UPWHF6C" target="_blank" class="btn-donate" onclick="activateHubLink()">DONATE & ACTIVATE HUB</a>
                
                <a href="https://notebooklm.google.com/notebook/25e90209-791c-4f6e-9506-aedb0e3cfb2f" class="btn-access" id="notebook-link">ACCESS THE NOTEBOOKLM HUB</a>
            </div>
        </div>
    </div>

    <script>
        function activateHubLink() {
            // Reveals the direct NotebookLM entry button after they click to donate
            setTimeout(() => {
                const link = document.getElementById('notebook-link');
                link.style.display = 'block';
                link.innerHTML = 'Payment initiated? Click here to access the Hub.';
            }, 3000); // 3-second delay feels natural
        }
    </script>

</body>
</html>
