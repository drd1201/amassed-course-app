<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Briefing • AMASSED</title>
    <style>
        body { margin: 0; min-height: 100vh; background: #fff url('bg.png') no-repeat center 220px; background-size: cover; display: flex; align-items: center; justify-content: center; font-family: sans-serif; padding: 20px; box-sizing: border-box; }
        .panel { background: rgba(255,255,255,0.96); padding: 2.5rem; border-radius: 20px; text-align: center; max-width: 600px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.25); backdrop-filter: blur(10px); }
        
        /* Video Aspect Ratio for YouTube Short */
        .video-wrap { position: relative; padding-bottom: 177.78%; /* Aspect ratio for vertical video */ height: 0; overflow: hidden; border-radius: 12px; margin: 1.5rem 0; background: #000; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .btn { background: #f97316; color: white; padding: 1.2rem 2rem; border-radius: 50px; text-decoration: none; font-weight: 900; display: inline-block; margin-top: 1rem; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }
        #access-hub { display: none; margin-top: 1.5rem; color: #f97316; font-weight: bold; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="panel">
        <h1 style="font-family: serif; font-size: 2.2rem; margin: 0;">MISSION BRIEFING</h1>
        
        <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/GuUOR4oM-Pc" allowfullscreen></iframe>
        </div>

        <p style="margin: 1rem 0; line-height: 1.6; color: #333; font-size: 1rem;">Support the mission to unlock the Strategic Intelligence Hub. Suggested donation: $5.02.</p>
        
        <a href="https://www.paypal.com/ncp/payment/8ZCPRZUCXXU58" target="_blank" class="btn" onclick="revealLink()">DONATE & ACTIVATE HUB</a>
        
        <div id="access-hub" onclick="location.href='https://notebooklm.google.com/notebook/25e90209-791c-4f6e-9506-aedb0e3cfb2f'">
            Payment initiated? Click here to enter the Hub.
        </div>
    </div>

    <script>
        function revealLink() {
            setTimeout(() => {
                document.getElementById('access-hub').style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
