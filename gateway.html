<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway • AMASSED</title>
    <style>
        body { margin: 0; height: 100vh; background: #fff url('bg.png') no-repeat center 75px; background-size: cover; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .panel { background: rgba(255,255,255,0.96); padding: 3rem; border-radius: 20px; text-align: center; max-width: 700px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
        .video-wrap { width: 100%; border-radius: 12px; overflow: hidden; margin: 1.5rem 0; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn { background: #f97316; color: white; padding: 1.2rem 2.5rem; border-radius: 50px; text-decoration: none; font-weight: 900; display: inline-block; margin-top: 1rem; transition: 0.3s; }
        #access-hub { display: none; margin-top: 1.5rem; color: #f97316; font-weight: bold; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="panel">
        <h1 style="font-family: serif; font-size: 2.5rem; margin: 0;">MISSION BRIEFING</h1>
        
        <div class="video-wrap">
            <iframe src="https://drive.google.com/file/d/1bWNeo0C8ouNP_OJCriWUaLPi6nkM6ppd/preview" width="100%" height="360" allow="autoplay"></iframe>
        </div>

        <p style="margin: 1rem 0; line-height: 1.6; color: #444;">Please support the mission to unlock the full Strategic Intelligence Hub. Suggested donation: $5.02.</p>
        
        <a href="https://www.paypal.com/ncp/payment/8ZCPRZUCXXU58" target="_blank" class="btn" onclick="revealLink()">DONATE & ACTIVATE ACCESS</a>
        
        <div id="access-hub" onclick="location.href='https://notebooklm.google.com/notebook/25e90209-791c-4f6e-9506-aedb0e3cfb2f'">
            Support initiated? Click here to enter the NotebookLM Hub.
        </div>
    </div>

    <script>
        function revealLink() {
            setTimeout(() => {
                document.getElementById('access-hub').style.display = 'block';
            }, 3000); // Reveals the link after 3 seconds
        }
    </script>
</body>
</html>
