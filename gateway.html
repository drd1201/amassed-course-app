<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Briefing • AMASSED</title>
    <style>
        body { margin: 0; height: 100vh; background: #000 url('bg.png') no-repeat center top; background-size: cover; display: flex; align-items: center; justify-content: center; font-family: sans-serif; padding: 10px; box-sizing: border-box; overflow: hidden; }
        
        .panel { 
            background: rgba(255,255,255,0.96); 
            padding: 1.5rem; 
            border-radius: 20px; 
            text-align: center; 
            max-width: 450px; /* Narrower for vertical video feel */
            width: 100%; 
            max-height: 95vh; /* Prevents overflow */
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
            backdrop-filter: blur(10px); 
        }
        
        h1 { font-family: serif; font-size: 1.8rem; margin: 0 0 10px 0; }

        .video-wrap { 
            position: relative; 
            flex-grow: 1;
            width: 100%; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-bottom: 15px;
        }
        .video-wrap iframe { width: 100%; height: 100%; border: none; min-height: 300px; }
        
        .instruction { font-size: 0.9rem; color: #333; margin-bottom: 15px; line-height: 1.4; }

        .btn { background: #f97316; color: white; padding: 0.8rem 1.8rem; border-radius: 50px; text-decoration: none; font-weight: 900; display: inline-block; font-size: 1rem; box-shadow: 0 8px 15px rgba(249, 115, 22, 0.3); }
        #access-hub { display: none; margin-top: 10px; color: #f97316; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>MISSION BRIEFING</h1>
        
        <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/GuUOR4oM-Pc" allowfullscreen></iframe>
        </div>

        <p class="instruction">Support the mission to unlock the Strategic Hub.<br>Suggested donation: $5.02.</p>
        
        <a href="https://www.paypal.com/ncp/payment/8ZCPRZUCXXU58" target="_blank" class="btn" onclick="revealLink()">DONATE & ACTIVATE HUB</a>
        
        <div id="access-hub" onclick="location.href='https://notebooklm.google.com/notebook/25e90209-791c-4f6e-9506-aedb0e3cfb2f'">
            Payment initiated? Click here to enter.
        </div>
    </div>

    <script>
        function revealLink() {
            setTimeout(() => {
                document.getElementById('access-hub').style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
