<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Briefing • AMASSED</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f97316; --dark: #050505; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            background: #f0f0f0 url('bg.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* Frosted Glass Panel */
        .panel-overlay {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 40px 20px;
        }

        .briefing-card {
            background: rgba(255, 255, 255, 0.95);
            max-width: 900px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            padding: 3rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0; color: var(--dark); text-transform: uppercase; }
        .tagline { color: var(--orange); font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 2rem; }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .instruction-text { color: #555; line-height: 1.6; font-size: 1.1rem; margin-bottom: 2.5rem; max-width: 700px; margin-left: auto; margin-right: auto; }

        /* Actions */
        .action-group { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }

        .btn-pay {
            background: var(--orange);
            color: white;
            padding: 1.5rem 3.5rem;
            border-radius: 50px;
            font-weight: 900;
            text-decoration: none;
            font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-pay:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(249, 115, 22, 0.6); }

        .portal-access {
            margin-top: 1rem;
            color: #888;
            font-size: 0.9rem;
            text-decoration: underline;
            cursor: pointer;
            transition: 0.3s;
        }
        .portal-access:hover { color: var(--dark); }

    </style>
</head>
<body>

    <div class="panel-overlay">
        <div class="briefing-card">
            <h1>AMASSED</h1>
            <div class="tagline">Mission Briefing</div>

            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID?rel=0" allowfullscreen></iframe>
            </div>

            <p class="instruction-text">
                To proceed to the <strong>NotebookLM Strategic Intelligence Hub</strong>, please support the mission. 
                Your contribution ensures the continued development and hosting of the AMASSED curriculum.
            </p>

            <div class="action-group">
                <a href="https://www.paypal.com/ncp/payment/8M9SA2UPWHF6C" target="_blank" class="btn-pay" onclick="enablePortal()">DONATE & ACTIVATE HUB</a>
                
                <div id="hidden-portal" style="display: none;">
                    <a href="https://notebooklm.google.com/notebook/25e90209-791c-4f6e-9506-aedb0e3cfb2f" class="portal-access">Already donated? Click here to enter the Hub.</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function enablePortal() {
            // Reveals the direct entry link after they click to pay
            setTimeout(() => {
                document.getElementById('hidden-portal').style.display = 'block';
            }, 3000);
        }
    </script>

</body>
</html>
