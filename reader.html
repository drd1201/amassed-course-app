<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMASSED • Strategic Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f97316; --dark: #050505; --glass: rgba(255, 255, 255, 0.9); }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; background: #000 url('bg.png') no-repeat center center; background-size: cover; overflow: hidden; }

        /* LEFT SIDE: CHAPTER INDEX (30%) */
        .sidebar { 
            width: 30%; height: 100%; background: var(--glass); 
            backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.3);
            padding: 2rem; box-sizing: border-box; overflow-y: auto;
        }

        /* RIGHT SIDE: TEXT AREA (70%) */
        .reader-container { 
            width: 70%; height: 100%; padding: 5vh 10%; 
            box-sizing: border-box; overflow-y: auto; background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
        }

        .chapter-btn { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.2rem; background: #fff; border-radius: 12px; margin-bottom: 12px;
            cursor: pointer; transition: 0.3s; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .chapter-btn:hover { border-color: var(--orange); transform: translateX(5px); }
        .chapter-btn.active { border-left: 5px solid var(--orange); background: #fff7ed; }

        .play-icon { color: var(--orange); font-size: 1.5rem; }
        
        .content-box { max-width: 800px; margin: 0 auto; color: #222; line-height: 1.9; font-size: 1.15rem; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--dark); margin-bottom: 1rem; }
        
        /* THE STICKY AUDIO PLAYER */
        .audio-bar {
            position: sticky; top: 0; background: #fff; padding: 1rem;
            border-bottom: 2px solid var(--orange); margin-bottom: 2rem;
            border-radius: 8px; display: flex; align-items: center; gap: 15px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 2rem;">Course Curriculum</h2>
        
        <div class="chapter-btn" onclick="loadData('The Introduction', 'intro.mp3', 'Your introduction text goes here...')">
            <div>
                <small style="color: var(--orange); font-weight: 900;">SESSION 01</small>
                <div style="font-weight: 700;">The Introduction</div>
            </div>
            <span class="play-icon">▶</span>
        </div>

        </div>

    <div class="reader-container">
        <div id="player-zone" style="display:none;">
            <div class="audio-bar">
                <strong id="now-playing" style="color:var(--orange)">Intro</strong>
                <audio id="main-audio" controls style="flex-grow:1; height: 35px;"></audio>
            </div>
        </div>

        <div id="content-view" class="content-box">
            <h1 style="text-align: center; margin-top: 20vh;">Select a Session</h1>
            <p style="text-align: center; color: #666;">Choose a chapter from the curriculum index to begin the Strategic Walk.</p>
        </div>
    </div>

    <script>
        function loadData(title, audioFile, textContent) {
            // Update Title and Text
            document.getElementById('content-view').innerHTML = `<h1>${title}</h1><div class='chapter-body'>${textContent}</div>`;
            
            // Update and Show Audio
            const audio = document.getElementById('main-audio');
            const zone = document.getElementById('player-zone');
            document.getElementById('now-playing').innerText = title;
            
            // Link to your Google Drive MP3 (Requires 'Direct Link' format)
            audio.src = audioFile; 
            zone.style.display = 'block';
            audio.play();
        }
    </script>
</body>
</html>
