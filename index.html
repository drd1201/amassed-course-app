<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMASSED • Battlefield Discipleship Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --orange: #f97316; 
            --gold: #D4A853; 
            --light-bg: #FFFFFF; 
            --dark-text: #050505; 
            --gray-text: #555555;
        }

        body { 
            background: var(--light-bg); 
            color: var(--dark-text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }

        .nav { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #EEEEEE; 
            box-sizing: border-box; 
        }

        .nav-logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem; 
            color: var(--dark-text); 
            font-weight: 900; 
            text-decoration: none; 
            letter-spacing: 2px;
        }

        .nav-cta { 
            background: var(--orange); 
            color: white; 
            padding: 0.8rem 1.6rem; 
            border-radius: 8px; 
            font-weight: 900; 
            text-decoration: none; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .hero { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden; 
            background: #f8f8f8 url('img/Amassed1.png') no-repeat center center;
            background-size: cover; 
        }

        .hero-overlay { 
            position: absolute; 
            inset: 0; 
            background: rgba(255, 255, 255, 0.25); 
            z-index: 1; 
        }

        .hero-content { 
            position: relative; 
            z-index: 2; 
            text-align: center; 
            padding: 2rem; 
        }

        .hero-title { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(3rem, 10vw, 6rem); 
            margin: 0; 
            line-height: 1; 
            color: var(--dark-text); 
            text-transform: uppercase;
        }

        .hero-tag { 
            color: var(--orange); 
            font-weight: 900; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            margin-top: 1rem; 
            font-size: 1rem;
        }

        .section { 
            padding: 100px 2rem; 
            max-width: 1400px; 
            margin: 0 auto; 
            text-align: center; 
        }

        .btn-portal { 
            background: var(--orange); 
            color: white; 
            padding: 1.5rem 3rem; 
            border-radius: 50px; 
            font-weight: 900; 
            font-size: 1.1rem;
            text-decoration: none; 
            display: inline-block; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4); 
        }
        .btn-portal:hover { 
            transform: translateY(-5px) scale(1.03); 
            box-shadow: 0 15px 50px rgba(249, 115, 22, 0.6); 
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="#" class="nav-logo">AMASSED</a>
        <a href="lesson.html?page=0" class="nav-cta">MY JOURNEY</a>
    </nav>
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">AMASSED</h1>
            <p class="hero-tag">Remember • Recount • Recertify</p>
        </div>
    </section>
    <section class="section">
        <a href="lesson.html?page=0" class="btn-portal">START THE STRATEGIC WALK</a>
    </section>
</body>
</html>
