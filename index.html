<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMASSED • Battlefield Discipleship Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --orange: #f97316; 
            --gold: #D4A853; 
            --light-bg: #FFFFFF; 
            --dark-text: #050505; 
            --gray-text: #555555;
        }

        body { 
            background: var(--light-bg); 
            color: var(--dark-text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }

        .nav { 
            position: fixed; top: 0; width: 100%; padding: 1rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); 
            z-index: 1000; border-bottom: 1px solid #EEEEEE; box-sizing: border-box; 
        }

        .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--dark-text); font-weight: 900; text-decoration: none; letter-spacing: 2px; }
        .nav-cta { background: var(--orange); color: white; padding: 0.8rem 1.6rem; border-radius: 8px; font-weight: 900; text-decoration: none; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3); }

        /* THE HERO FIX */
        .hero { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden; 
            /* Fallback to light gray if image fails */
            background-color: #f0f0f0; 
            /* Using Absolute URL to prevent path errors */
            background-image: url('https://course.buzzsmart.org/img/Amassed1.png');
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
        }

        /* Second try with lowercase just in case GitHub renamed it */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('https://course.buzzsmart.org/img/amassed1.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
            opacity: 1;
        }

        .hero-overlay { 
            position: absolute; inset: 0; 
            background: rgba(255, 255, 255, 0.1); /* Very light to let the globe pop */
            z-index: 1; 
        }

        .hero-content { position: relative; z-index: 2; text-align: center; padding: 2rem; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 6rem); margin: 0; color: var(--dark-text); text-transform: uppercase; }
        .hero-tag { color: var(--orange); font-weight: 900; letter-spacing: 6px; text-transform: uppercase; margin-top: 1rem; }

        .section { padding: 100px 2rem; max-width: 1400px; margin: 0 auto; text-align: center; }
        .btn-portal { 
            background: var(--orange); color: white; padding: 1.5rem 3rem; 
            border-radius: 50px; font-weight: 900; text-decoration: none; 
            display: inline-block; box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4); 
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="#" class="nav-logo">AMASSED</a>
        <a href="lesson.html?page=0" class="nav-cta">MY JOURNEY</a>
    </nav>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">AMASSED</h1>
            <p class="hero-tag">Remember • Recount • Recertify</p>
        </div>
    </section>

    <section class="section">
        <a href="lesson.html?page=0" class="btn-portal">START THE STRATEGIC WALK</a>
    </section>
</body>
</html>
