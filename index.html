<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amassed | Begin Your Journey</title>
    <style>
        /* Modern, High-End Cinematic Style */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        /* Background Video / Image */
        .video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.6);
            object-fit: cover;
        }

        /* Hero Container */
        .hero-content {
            text-align: center;
            z-index: 1;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 8px;
            font-weight: 200;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            margin: 20px 0 40px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1.5px;
        }

        /* The Gateway Button */
        .journey-btn {
            padding: 18px 45px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .journey-btn:hover {
            background-color: #ddd;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .journey-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="img/background-video.mp4" type="video/mp4">
    </video>

    <div class="hero-content">
        <h1>AMASSED</h1>
        <p>A Shift in Leadership Paradigm</p>
        
        <button onclick="handleStartJourney()" class="journey-btn">
            Begin Journey
        </button>
    </div>

    <script>
        function handleStartJourney() {
            // Replace with your specific Payhip link
            const paywallUrl = "https://payhip.com/b/YOUR_PRODUCT_ID"; 
            
            // Redirect logic
            window.location.href = paywallUrl;
        }
    </script>

</body>
</html>
