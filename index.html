<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Learning Portal</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; border-right: 1px solid #222; background: #111; padding: 20px; }
        #content { flex: 1; padding: 40px; overflow-y: auto; }
        .audio-player { position: fixed; bottom: 0; left: 300px; right: 0; background: #1a1a1a; padding: 20px; border-top: 1px solid #D4A853; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color:#D4A853">AMASSED</h2>
        <div id="moduleList"></div>
    </div>
    <div id="content">
        <h1 id="title">Select a Module</h1>
        <div id="textBody"></div>
    </div>
    <div class="audio-player">
        <audio id="audioSource" controls style="width: 100%"></audio>
    </div>

    <script src="curriculum_data.js"></script>
    <script>
        function loadModule(id) {
            const data = MODULE_DATA[id];
            document.getElementById('title').innerText = data.title;
            document.getElementById('textBody').innerHTML = data.content;
            document.getElementById('audioSource').src = data.audio;
        }
        
        // Build the sidebar menu automatically
        const list = document.getElementById('moduleList');
        MODULE_DATA.forEach((mod, index) => {
            list.innerHTML += `<div onclick="loadModule(${index})" style="cursor:pointer; padding:10px; border-bottom:1px solid #222">${mod.title}</div>`;
        });
    </script>
</body>
</html>
