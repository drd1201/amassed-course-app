<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMASSED • Battlefield Discipleship</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f97316; --dark: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; overflow: hidden; background: #000; }

        .hero { 
            height: 100vh; 
            width: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            /* FIXED BLUR: Use 'contain' to keep the image sharp and top-aligned */
            background: #000 url('bg.png') no-repeat;
            background-size: cover; 
            background-position: center top; 
        }

        .nav { position: fixed; top: 0; width: 100%; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--dark); font-weight: 900; text-decoration: none; letter-spacing: 2px; }
        .nav-cta { background: var(--orange); color: white; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 900; text-decoration: none; font-size: 0.8rem; }

        .hero-content { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            background: rgba(255,255,255,0.88); 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.6); 
            backdrop-filter: blur(15px); 
            max-width: 80%; 
            /* Pushes panel down to reveal names at the top */
            margin-top: 15vh; 
        }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 4rem); margin: 0; text-transform: uppercase; color: var(--dark); }
        .hero-tag { color: var(--orange); font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-top: 0.5rem; font-size: 0.8rem; }
        
        .btn-start { background: var(--orange); color: white; padding: 1rem 2rem; border-radius: 50px; font-weight: 900; text-decoration: none; display: inline-block; margin-top: 1.5rem; font-size: 1rem; box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4); }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="#" class="nav-logo">AMASSED</a>
        <a href="lesson.html?page=0" class="nav-cta">MY JOURNEY</a>
    </nav>
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">AMASSED</h1>
            <p class="hero-tag">Remember • Recount • Recertify</p>
            <a href="gateway.html" class="btn-start">START THE STRATEGIC WALK</a>
        </div>
    </section>
</body>
</html>
