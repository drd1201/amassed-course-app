<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMASSED • Strategic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f97316; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .hero-glow { position: absolute; width: 400px; height: 400px; background: var(--orange); filter: blur(150px); opacity: 0.2; z-index: 0; }
        .content { z-index: 1; }
        h1 { font-family: 'Playfair Display', serif; font-size: 5rem; margin-bottom: 0; }
        .btn-enter { background: var(--orange); color: black; padding: 1.5rem 3rem; border-radius: 50px; font-weight: 900; text-decoration: none; display: inline-block; margin-top: 2rem; transition: 0.3s; box-shadow: 0 0 30px rgba(249, 115, 22, 0.4); }
        .btn-enter:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(249, 115, 22, 0.6); }
    </style>
</head>
<body>
    <div class="hero-glow"></div>
    <div class="content">
        <img src="img/cover-populace.png" style="height: 300px; margin-bottom: 1rem;">
        <h1>AMASSED</h1>
        <p style="letter-spacing: 5px; color: #888;">REMEMBER • RECOUNT • RECERTIFY</p>
        <a href="lesson.html?module=0" class="btn-enter">START THE JOURNEY</a>
    </div>
</body>
</html>
