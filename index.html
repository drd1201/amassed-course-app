<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amassed | Begin Your Journey</title>
    <style>
        /* Tactical & Clean Aesthetic */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4; /* Light theme base */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Video Background Container */
        .video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.7);
        }

        .hero-content {
            text-align: center;
            z-index: 1;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 3rem;
            color: #333;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        /* The Journey Button */
        .journey-btn {
            padding: 18px 40px;
            font-size: 1.25rem;
            font-weight: bold;
            text-transform: uppercase;
            background-color: #222;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .journey-btn:hover {
            background-color: #444;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .journey-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <video autoplay muted loop class="video-bg">
        <source src="img/background-video.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div class="hero-content">
        <h1>AMASSED</h1>
        <p>The Journey into Leadership Begins Here.</p>
        
        <button onclick="handleStartJourney()" class="journey-btn">
            Begin Journey
        </button>
    </div>

    <script>
        /**
         * Logic: Redirect to Payhip Paywall/Donation
         * Replace the URL below with your actual Payhip Product Link
         */
        function handleStartJourney() {
            // Replace 'YOUR_PRODUCT_ID' with your Payhip link ID
            const paywallUrl = "https://payhip.com/b/YOUR_PRODUCT_ID"; 
            
            // Sends the user to the donation page
            window.location.href = paywallUrl;
        }
    </script>

</body>
</html>
