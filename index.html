<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMASSED • Battlefield Discipleship</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f97316; --dark: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; overflow: hidden; background: #000; }

        .hero { 
            height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; 
            background: #000 url('bg.png') no-repeat center center; background-size: cover; 
        }

        .nav { position: fixed; top: 0; width: 100%; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--dark); font-weight: 900; text-decoration: none; letter-spacing: 2px; }

        .hero-content { 
            position: relative; z-index: 10; text-align: center; 
            background: rgba(255,255,255,0.88); 
            padding: 3.5rem 4rem; /* Increased size slightly */
            border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.6); backdrop-filter: blur(15px); 
            max-width: 85%; 
        }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 7vw, 4.5rem); margin: 0; text-transform: uppercase; color: var(--dark); }
        .hero-tag { color: var(--orange); font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-top: 0.5rem; font-size: 0.9rem; }
        
        .authors { margin-top: 1.5rem; font-size: 1rem; color: #555; font-weight: 400; line-height: 1.4; }
        .authors strong { color: var(--dark); }

        .btn-start { background: var(--orange); color: white; padding: 1.2rem 2.5rem; border-radius: 50px; font-weight: 900; text-decoration: none; display: inline-block; margin-top: 2rem; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4); transition: 0.3s; }
        .btn-start:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <nav class="nav"><a href="#" class="nav-logo">AMASSED</a></nav>
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">AMASSED</h1>
            <p class="hero-tag">Remember • Recount • Recertify</p>
            <div class="authors">
                Sheri Kamerzell, David Setzer,<br><strong>Dana Richardson, Th.D.</strong>
            </div>
            <a href="gateway.html" class="btn-start">START THE STRATEGIC WALK</a>
        </div>
    </section>
</body>
</html>
